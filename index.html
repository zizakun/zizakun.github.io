<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Showcase</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fff;
  color: #1d1d1f;
}

/* HERO */
.hero {
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  font-size: 12px;
  font-weight: 400;
  margin-bottom: 15px;
}

/* SECTION */
.section {
  display: flex;
  padding: 30px 20px;
  border-bottom: 1px solid #eee;
}

.title {
  width: 160px;
  font-size: 18px;
  font-weight: 500;
}

.images {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

/* IMAGE */
.img-wrap {
  position: relative;
  cursor: pointer;
}

.img-wrap img.main {
  max-width: 100%;
  border-radius: 10px;
  pointer-events: none;
}

.img-wrap img.wm {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 25%;
  max-width: 80px;
  transform: translate(-50%, -50%);
  opacity: 0.35;
  pointer-events: none;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  opacity: 0;
  transition: 0.3s;
}

.modal.show {
  display: flex;
  opacity: 1;
}

.modal-content {
  position: relative;
}

.modal-content img.main {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: 12px;
}

.modal-content img.wm {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 25%;
  max-width: 120px;
  transform: translate(-50%, -50%);
  opacity: 0.35;
  pointer-events: none;
}

/* CLOSE */
.close-btn {
  position: absolute;
  top: 20px;
  right: 25px;
  font-size: 28px;
  color: #fff;
  cursor: pointer;
}

/* MOBILE */
@media (max-width:768px){
  .section {
    flex-direction: column;
  }
  .title {
    margin-bottom: 10px;
  }
}

.owner-link {
  display: block;
  margin-top: 10px;
  font-size: 13px;
  color: #0071e3;
  text-decoration: none;
}
</style>
</head>

<body oncontextmenu="return false">

<div class="hero">
  <h1>Pemilik akun MLBB ini adalah:</h1>
  <div class="img-wrap" onclick="openModal('assets/owner.jpg')">
    <img class="main" src="assets/owner.jpg" loading="lazy">
  </div>

  <a href="https://facebook.com/TheOnlyZiz" target="_blank" class="owner-link">
    Lihat profil di facebook
  </a>
</div>

<div id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close-btn" onclick="closeModal()">×</span>
  <div class="modal-content">
    <img id="modalImg" class="main">
    <img class="wm" src="assets/wm.png">
  </div>
</div>

<script>
const data = {
  akun: 7,
  eliminasi: 3,
  statue: 4,
  notifikasi: 2,
  spawn: 3,
  trail: 4,
  emot: 10,
  aksi: 5,
  chat: 1,
  dinamis: 1,
  avatar: 8,
  skin: 8,
  galery 41
};

const gallery = document.getElementById("gallery");

let imageList = [];
let currentIndex = 0;

function createImage(folder, index) {
  const src = `assets/${folder}/${index}.jpg`;
  imageList.push(src);

  const wrap = document.createElement("div");
  wrap.className = "img-wrap";
  wrap.onclick = () => openModal(src);

  wrap.innerHTML = `
    <img class="main" src="${src}" loading="lazy">
    <img class="wm" src="assets/wm.png">
  `;

  return wrap;
}

function createSection(folder, total) {
  const section = document.createElement("div");
  section.className = "section";

  const title = document.createElement("div");
  title.className = "title";
  title.textContent = folder[0].toUpperCase() + folder.slice(1);

  const images = document.createElement("div");
  images.className = "images";

  for (let i = 1; i <= total; i++) {
    images.appendChild(createImage(folder, i));
  }

  section.append(title, images);
  return section;
}

Object.entries(data).forEach(([folder, total]) => {
  gallery.appendChild(createSection(folder, total));
});

/* MODAL */
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modalImg");

function openModal(src) {
  currentIndex = imageList.indexOf(src);
  modalImg.src = src;
  modal.classList.add("show");
}

function closeModal() {
  modal.classList.remove("show");
}

/* SWIPE */
let startX = 0;

modal.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, { passive: true });

modal.addEventListener("touchend", e => {
  const endX = e.changedTouches[0].clientX;
  const diff = startX - endX;

  if (Math.abs(diff) < 50) return; // ignore kecil

  if (diff > 0) {
    // swipe kiri → next
    currentIndex = (currentIndex + 1) % imageList.length;
  } else {
    // swipe kanan → prev
    currentIndex = (currentIndex - 1 + imageList.length) % imageList.length;
  }

  modalImg.src = imageList[currentIndex];
}, { passive: true });
</
